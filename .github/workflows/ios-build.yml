name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..
      
      - name: Build frontend
        run: npm run build-frontend
      
      - name: Setup Capacitor and iOS
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init Milangela com.milangela.app --web-dir=frontend/dist
          npx cap add ios
          npx cap sync
      
      - name: Update deployment target
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :IPHONEOS_DEPLOYMENT_TARGET 15.0" App.xcodeproj/project.pbxproj || true
          sed -i '' 's/13.0/15.0/g' App.xcodeproj/project.pbxproj
          pod install --repo-update || pod install
      
      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r Milangela.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Milangela-iOS
          path: Milangela.ipa
