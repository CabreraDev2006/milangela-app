name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies and build frontend
        run: |
          npm install
          cd frontend && npm install && cd ..
          npm run build-frontend
      
      - name: Create iOS project with Capacitor
        run: |
          # Instalar Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
          # Inicializar Capacitor
          npx cap init Milangela com.milangela.app --web-dir=frontend/dist
          
          # Agregar iOS (esto creará la carpeta ios/)
          npx cap add ios
      
      - name: 🔧 FIX Podfile BEFORE pod install
        run: |
          cd ios/App
          
          # IMPORTANTE: Borrar Podfile.lock y Pods/ si existen
          rm -rf Pods Podfile.lock
          
          # Crear Podfile correcto
          cat > Podfile << 'EOF'
          platform :ios, '15.0'
          
          target 'App' do
            use_frameworks! :linkage => :static
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          echo "=== Podfile creado ==="
          cat Podfile
          echo "======================"
      
      - name: Fix deployment target in project
        run: |
          cd ios/App
          # Modificar deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 1[0-3]/IPHONEOS_DEPLOYMENT_TARGET = 15/g' App.xcodeproj/project.pbxproj
          
          # Eliminar storyboards
          sed -i '' '/Main.storyboard/d' App.xcodeproj/project.pbxproj
          sed -i '' '/LaunchScreen.storyboard/d' App.xcodeproj/project.pbxproj
          
          # Modificar Info.plist
          cd App
          /usr/libexec/PlistBuddy -c "Delete :UIMainStoryboardFile" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UILaunchStoryboardName" Info.plist 2>/dev/null || true
          cd ..
      
      - name: 📦 Install Pods
        run: |
          cd ios/App
          pod install --repo-update
      
      - name: Sync Capacitor
        run: npx cap sync
      
      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Milangela-iOS
          path: ios/App/build/Release-iphoneos/App.app
