name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..
      
      - name: Build frontend
        run: npm run build-frontend
      
      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init Milangela com.milangela.app --web-dir=frontend/dist
          npx cap add ios
      
      - name: FIX - Create correct Podfile
        run: |
          cd ios/App
          rm -f Podfile Podfile.lock
          echo 'platform :ios, "15.0"' > Podfile
          echo '' >> Podfile
          echo 'target "App" do' >> Podfile
          echo '  pod "Capacitor", :path => "../../node_modules/@capacitor/ios"' >> Podfile
          echo '  pod "CapacitorCordova", :path => "../../node_modules/@capacitor/ios"' >> Podfile
          echo 'end' >> Podfile
          cat Podfile
      
      - name: Fix project deployment target
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :IPHONEOS_DEPLOYMENT_TARGET 15.0" App.xcodeproj/project.pbxproj || true
          perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = 1[0-3]\.[0-9]/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj
      
      - name: Install pods
        run: |
          cd ios/App
          pod deintegrate || true
          pod install --repo-update
      
      - name: Sync Capacitor
        run: npx cap sync
      
      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          find ios/App -name "*.app" -type d -exec cp -r {} Payload/ \;
          zip -r Milangela.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Milangela-iOS
          path: Milangela.ipa
