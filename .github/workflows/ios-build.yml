name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build frontend and setup
        run: |
          npm install
          cd frontend && npm install && cd ..
          npm run build-frontend
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init Milangela com.milangela.app --web-dir=frontend/dist
          npx cap add ios
      
      - name: Fix iOS deployment target
        run: |
          cd ios/App
          # Crear Podfile correcto
          echo 'platform :ios, "15.0"' > Podfile
          echo '' >> Podfile
          echo "target 'App' do" >> Podfile
          echo "  pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'" >> Podfile
          echo "  pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'" >> Podfile
          echo "end" >> Podfile
          
          # Instalar pods
          pod install --repo-update
          
          # Volver y sync
          cd ../..
          npx cap sync
      
      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
      
      - name: Create and upload IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r Milangela.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Milangela-iOS
          path: Milangela.ipa
