name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..
      
      - name: Build frontend
        run: npm run build-frontend
      
      - name: Capacitor sync
        run: npx cap sync
      
      - name: Install pods and build
        run: |
          cd ios/App
          pod install --repo-update
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Milangela-iOS
          path: ios/App/build/Release-iphoneos/App.app
