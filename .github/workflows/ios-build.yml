name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies and build frontend
        run: |
          npm install
          cd frontend && npm install && cd ..
          npm run build-frontend
      
      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init Milangela com.milangela.app --web-dir=frontend/dist
          npx cap add ios
      
      - name: MANUAL FIX - Override Podfile
        run: |
          cd ios/App
          # Eliminar Podfile existente
          rm -f Podfile
          # Crear Podfile correcto
          cat > Podfile << 'EOF'
          platform :ios, '15.0'
          
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          
          echo "=== Contenido de Podfile ==="
          cat Podfile
          echo "============================"
          
          # Modificar project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj
      
      - name: Install Pods
        run: |
          cd ios/App
          pod install --repo-update
      
      - name: Sync Capacitor
        run: npx cap sync
      
      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r Milangela.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Milangela-iOS
          path: Milangela.ipa
